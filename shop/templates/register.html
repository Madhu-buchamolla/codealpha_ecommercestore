<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:100px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
        }

        button{
            background:blue;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }

        p{
            text-align:center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Register</button>
    </form>

    <p>
        Already have an account?
        <a href="/accounts/login/">Login</a>
    </p>

</div>

</body>
</html>
