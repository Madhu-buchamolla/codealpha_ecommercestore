<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}
.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
button{
    background:green;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="container">
<h2>Login</h2>

<form method="POST">
{% csrf_token %}
{{ form.as_p }}
<button type="submit">Login</button>
</form>

<a href="/register/">Create Account</a>

</div>

</body>
</html>
